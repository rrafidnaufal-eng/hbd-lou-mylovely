<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Lou My Lovely</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Fredoka+One&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-dark: #ff4d6d;
            --pink-medium: #ff758f;
            --pink-light: #ffb3c1;
            --envelope-color: #ff85a1;
        }

        body {
            margin: 0; padding: 0;
            background-color: #fff0f3;
            background-image: radial-gradient(#ffccd5 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Quicksand', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; overflow: hidden;
        }

        /* Container Utama Layout */
        .main-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            width: 90%;
            max-width: 1000px;
            z-index: 10;
        }

        /* --- SISI KIRI: INFO & FOTO --- */
        .left-side { text-align: center; flex: 1; }
        
        .left-side h1 { 
            font-family: 'Fredoka One', cursive; 
            color: var(--pink-dark);
            font-size: 3rem; margin: 0;
        }

        .date-tag {
            background: var(--pink-dark);
            color: white; padding: 5px 20px;
            border-radius: 20px; display: inline-block;
            font-weight: bold; margin: 10px 0;
        }

        .photo-container {
            position: relative;
            width: 220px; height: 220px;
            margin: 20px auto;
        }

        /* Topi Ultah di Atas Foto */
        .birthday-hat {
            position: absolute;
            top: -45px; left: 50%;
            transform: translateX(-50%) rotate(-15deg);
            width: 80px; z-index: 5;
        }

        .photo-circle {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .photo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .name-tag { color: var(--pink-dark); font-weight: bold; margin-top: 10px; }

        /* --- SISI KANAN: AMPLOP --- */
        .right-side { flex: 1; display: flex; justify-content: center; position: relative; }

        .envelope-wrapper {
            position: relative;
            width: 300px; height: 200px;
            background-color: var(--envelope-color);
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .envelope-wrapper::before {
            content: ""; position: absolute; z-index: 2;
            border-top: 100px solid transparent;
            border-left: 150px solid #ffb1bd;
            border-right: 150px solid #ffb1bd;
            border-bottom: 100px solid #ffb1bd;
            top: 0;
        }

        .flap {
            position: absolute; top: 0; width: 0; height: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid var(--pink-dark);
            transform-origin: top;
            transition: transform 0.4s 0.4s ease;
            z-index: 3;
        }

        .letter {
            position: absolute; bottom: 0; left: 10px;
            width: 280px; height: 180px;
            background: white; padding: 20px;
            box-sizing: border-box; transition: 0.6s ease;
            z-index: 1; border-radius: 5px;
            overflow-y: auto;
        }

        .letter h2 { font-family: 'Dancing Script', cursive; color: var(--pink-dark); margin: 0; font-size: 1.3rem; }
        .letter p { font-size: 0.85rem; line-height: 1.6; color: #444; }

        /* Animasi Open */
        .envelope-wrapper.open .flap { transform: rotateX(180deg); z-index: 0; }
        .envelope-wrapper.open .letter { transform: translateY(-160px); height: 350px; z-index: 4; }

        /* Confetti */
        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }

        /* Tombol Bawah Foto */
        .btn-open {
            background: var(--pink-dark); color: white; border: none;
            padding: 10px 25px; border-radius: 20px; cursor: pointer;
            font-weight: bold; margin-top: 15px; box-shadow: 0 4px 10px rgba(248,77,109,0.3);
        }

        /* Mobile Adjust */
        @media (max-width: 768px) {
            .main-container { flex-direction: column; gap: 30px; height: auto; padding-top: 50px; }
            .envelope-wrapper.open .letter { transform: translateY(-120px); height: 300px; }
        }
    </style>
</head>
<body>

    <canvas id="confetti-canvas"></canvas>

    <div class="main-container">
        <div class="left-side">
            <h1>Happy Birthday</h1>
            <div class="date-tag">✨ 17 March ✨</div>
            <div class="photo-container">
                <svg class="birthday-hat" viewBox="0 0 100 100">
                    <path d="M50 10 L10 90 L90 90 Z" fill="#ff4d6d" />
                    <circle cx="50" cy="10" r="5" fill="white" />
                    <path d="M20 70 Q50 80 80 70" fill="none" stroke="white" stroke-width="2" />
                </svg>
                <div class="photo-circle">
                    <img src="https://lh3.googleusercontent.com/d/1WJoaXRibisIAo7aHjD-B2Z6D_Z-x5TcB" alt="Lou">
                </div>
            </div>
            <div class="name-tag">Dear Lou my lovely</div>
            <button class="btn-open" onclick="openEnvelope()">Klik Buka Surat 💌</button>
        </div>

        <div class="right-side">
            <div class="envelope-wrapper" id="envelope" onclick="openEnvelope()">
                <div class="flap"></div>
                <div class="letter">
                    <h2>Dear Lou...</h2>
                    <p>
                        Happy birthday sayangku cintaku Lou, selamat ulang tahun yang ke 21 ya semoga panjang umur, sehat selalu, makin cantik, dan apa yang kamu cita-citakan bisa tercapai di tahun ini. 
                        <br><br>
                        Tetap jadi Lou yang luar biasa ya! I love you so much! ❤️
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            const env = document.getElementById('envelope');
            env.classList.toggle('open');
            
            if(env.classList.contains('open')) {
                startConfetti();
            }
        }

        // Script Confetti Meriah
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let pieces = [];

        function startConfetti() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < 150; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 8 + 5,
                    color: ['#ff4d6d', '#ff758f', '#ffb3c1', '#ffffff'][Math.floor(Math.random() * 4)],
                    speed: Math.random() * 3 + 2,
                    rotation: Math.random() * 360
                });
            }
            updateConfetti();
        }

        function updateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            pieces.forEach(p => {
                p.y += p.speed;
                p.rotation += p.speed;
                ctx.fillStyle = p.color;
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            });
            if(pieces.length > 0) requestAnimationFrame(updateConfetti);
        }
    </script>
</body>
</html>
